<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ContaFlow — Automatización Contable</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#080F1E;
  --navy2:#0D1A30;
  --navy3:#112040;
  --navy4:#1A3060;
  --emerald:#00D97E;
  --emerald-dim:#00A85F;
  --emerald-glow:rgba(0,217,126,0.15);
  --gold:#F0A500;
  --gold-dim:#C07E00;
  --red:#FF4757;
  --red-dim:#CC2233;
  --blue:#4A9EFF;
  --text-primary:#E8EEF8;
  --text-secondary:#7A95B8;
  --text-muted:#3D5A80;
  --border:#1E3358;
  --border-light:#253D63;
  --card:#0D1A30;
  --card2:#112040;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
  --display:'Syne',sans-serif;
}
html,body,#root{height:100%;overflow:hidden}
body{background:var(--navy);color:var(--text-primary);font-family:var(--sans);font-size:14px;line-height:1.5}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:220px;min-width:220px;background:var(--navy2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-hex{width:32px;height:32px;background:var(--emerald);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-hex span{font-family:var(--display);font-weight:800;font-size:13px;color:var(--navy);line-height:1}
.logo-text{font-family:var(--display);font-weight:700;font-size:16px;color:var(--text-primary);letter-spacing:-0.3px}
.logo-sub{font-family:var(--mono);font-size:9px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:1px}

.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{padding:8px 14px 4px;font-family:var(--mono);font-size:9px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;transition:all 0.15s;border-left:2px solid transparent;color:var(--text-secondary);font-size:13px}
.nav-item:hover{background:var(--navy3);color:var(--text-primary)}
.nav-item.active{background:linear-gradient(90deg,rgba(0,217,126,0.12),transparent);border-left-color:var(--emerald);color:var(--emerald)}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:0.8}
.nav-item.active svg{opacity:1}
.nav-badge{margin-left:auto;background:var(--emerald);color:var(--navy);font-family:var(--mono);font-size:9px;font-weight:600;padding:1px 6px;border-radius:10px}
.nav-badge.red{background:var(--red)}

.sidebar-footer{padding:14px 18px;border-top:1px solid var(--border)}
.sync-status{display:flex;flex-direction:column;gap:6px}
.sync-row{display:flex;align-items:center;gap:8px;font-size:11px}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sync-dot.on{background:var(--emerald);box-shadow:0 0 6px var(--emerald)}
.sync-dot.off{background:var(--text-muted)}
.sync-label{color:var(--text-secondary);font-family:var(--mono);font-size:10px}
.sync-time{margin-left:auto;color:var(--text-muted);font-family:var(--mono);font-size:9px}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--navy2)}
.topbar-title{font-family:var(--display);font-size:18px;font-weight:700;letter-spacing:-0.3px}
.topbar-sub{font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:0.5px}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:6px;font-size:12px;font-family:var(--sans);font-weight:500;cursor:pointer;border:none;transition:all 0.15s;white-space:nowrap}
.btn-primary{background:var(--emerald);color:var(--navy);font-weight:600}
.btn-primary:hover{background:#00f090;box-shadow:0 0 16px rgba(0,217,126,0.4)}
.btn-secondary{background:transparent;color:var(--text-secondary);border:1px solid var(--border-light)}
.btn-secondary:hover{background:var(--navy3);color:var(--text-primary);border-color:var(--text-muted)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(255,71,87,0.3)}
.btn-danger:hover{background:rgba(255,71,87,0.1)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn svg{width:13px;height:13px}

.content{flex:1;overflow-y:auto;padding:24px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.card-title{font-family:var(--display);font-size:13px;font-weight:700;letter-spacing:0.2px}
.card-body{padding:18px}

/* DASHBOARD GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.green::before{background:var(--emerald)}
.kpi.gold::before{background:var(--gold)}
.kpi.blue::before{background:var(--blue)}
.kpi.red::before{background:var(--red)}
.kpi-label{font-family:var(--mono);font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
.kpi-value{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--text-primary);letter-spacing:-0.5px}
.kpi-value.green{color:var(--emerald)}
.kpi-value.gold{color:var(--gold)}
.kpi-value.red{color:var(--red)}
.kpi-delta{font-family:var(--mono);font-size:10px;color:var(--text-muted);margin-top:4px}
.kpi-icon{position:absolute;bottom:12px;right:14px;opacity:0.08;font-size:32px}

.dash-grid{display:grid;grid-template-columns:1fr 340px;gap:16px}

/* TABLES */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid rgba(30,51,88,0.5);font-size:12px;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.td-mono{font-family:var(--mono)}
.td-cuenta{font-family:var(--mono);color:var(--blue);font-size:11px}
.td-amount{font-family:var(--mono);text-align:right}
.td-amount.debit{color:var(--text-primary)}
.td-amount.credit{color:var(--emerald)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:0.3px}
.badge::before{content:'';width:5px;height:5px;border-radius:50%}
.badge-ok{background:rgba(0,217,126,0.12);color:var(--emerald)}.badge-ok::before{background:var(--emerald)}
.badge-pending{background:rgba(240,165,0,0.12);color:var(--gold)}.badge-pending::before{background:var(--gold)}
.badge-error{background:rgba(255,71,87,0.12);color:var(--red)}.badge-error::before{background:var(--red)}
.badge-info{background:rgba(74,158,255,0.12);color:var(--blue)}.badge-info::before{background:var(--blue)}

/* PLATFORM PILLS */
.pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;font-family:var(--mono)}
.pill-siigo{background:rgba(74,158,255,0.15);color:#7BB8FF;border:1px solid rgba(74,158,255,0.25)}
.pill-alegra{background:rgba(240,165,0,0.12);color:var(--gold);border:1px solid rgba(240,165,0,0.25)}
.pill-both{background:rgba(0,217,126,0.1);color:var(--emerald);border:1px solid rgba(0,217,126,0.2)}

/* FORMS */
.form-grid{display:grid;gap:14px}
.form-row{display:grid;gap:14px}
.form-2{grid-template-columns:1fr 1fr}
.form-3{grid-template-columns:1fr 1fr 1fr}
.form-4{grid-template-columns:1fr 1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:5px}
label{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted)}
input,select,textarea{background:var(--navy3);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text-primary);font-family:var(--sans);font-size:13px;outline:none;transition:border-color 0.15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--emerald);box-shadow:0 0 0 3px rgba(0,217,126,0.08)}
input::placeholder{color:var(--text-muted)}
select option{background:var(--navy3)}
.input-mono{font-family:var(--mono)}
.field-hint{font-size:10px;color:var(--text-muted)}

/* CAUSACIONES TABLE */
.caus-table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px}
.caus-table{width:100%;border-collapse:collapse;min-width:700px}
.caus-table th{background:var(--navy3);font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);padding:9px 10px;text-align:left;border-bottom:1px solid var(--border)}
.caus-table td{padding:5px 6px;border-bottom:1px solid rgba(30,51,88,0.4)}
.caus-table td input,.caus-table td select{background:transparent;border:1px solid transparent;border-radius:4px;padding:5px 8px;font-size:12px;color:var(--text-primary)}
.caus-table td input:focus,.caus-table td select:focus{background:var(--navy3);border-color:var(--emerald)}
.caus-table .td-actions{width:36px;text-align:center}
.row-del{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;border-radius:4px;transition:color 0.15s}
.row-del:hover{color:var(--red)}
.caus-totals{display:flex;justify-content:flex-end;gap:32px;padding:12px 16px;background:var(--navy3);border-top:1px solid var(--border);border-radius:0 0 8px 8px}
.caus-total-item{text-align:right}
.caus-total-label{font-family:var(--mono);font-size:9px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase}
.caus-total-value{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--text-primary);margin-top:2px}
.caus-total-value.balanced{color:var(--emerald)}
.caus-total-value.unbalanced{color:var(--red)}
.balance-indicator{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:6px;font-size:12px;font-weight:500;margin-top:10px}
.balance-indicator.ok{background:rgba(0,217,126,0.08);border:1px solid rgba(0,217,126,0.2);color:var(--emerald)}
.balance-indicator.bad{background:rgba(255,71,87,0.08);border:1px solid rgba(255,71,87,0.2);color:var(--red)}

/* AUTOMATIONS */
.auto-grid{display:grid;gap:12px}
.auto-card{background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:flex;align-items:center;gap:14px}
.auto-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.auto-icon.green{background:rgba(0,217,126,0.12);border:1px solid rgba(0,217,126,0.2)}
.auto-icon.gold{background:rgba(240,165,0,0.10);border:1px solid rgba(240,165,0,0.2)}
.auto-icon.blue{background:rgba(74,158,255,0.10);border:1px solid rgba(74,158,255,0.2)}
.auto-info{flex:1;min-width:0}
.auto-name{font-weight:600;font-size:13px;color:var(--text-primary)}
.auto-desc{font-size:11px;color:var(--text-secondary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.auto-meta{display:flex;gap:8px;margin-top:6px;align-items:center}
.auto-actions{display:flex;gap:8px;flex-shrink:0}
.toggle{width:36px;height:20px;background:var(--border);border-radius:10px;cursor:pointer;position:relative;transition:background 0.2s;border:none;flex-shrink:0}
.toggle.on{background:var(--emerald)}
.toggle::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left 0.2s}
.toggle.on::after{left:19px}

/* PROGRESS BAR */
.progress-wrap{margin:6px 0}
.progress-label{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--text-muted);margin-bottom:4px}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width 0.5s}
.progress-fill.green{background:var(--emerald);box-shadow:0 0 8px rgba(0,217,126,0.5)}
.progress-fill.gold{background:var(--gold)}
.progress-fill.red{background:var(--red)}

/* CONFIG */
.config-section{margin-bottom:24px}
.config-section-title{font-family:var(--display);font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.platform-badge{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:4px;letter-spacing:1px;text-transform:uppercase}
.pb-siigo{background:rgba(74,158,255,0.15);color:#7BB8FF}
.pb-alegra{background:rgba(240,165,0,0.12);color:var(--gold)}
.api-field{position:relative}
.api-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;padding:4px}
.connection-test{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:6px;font-size:12px;margin-top:10px}
.connection-test.ok{background:rgba(0,217,126,0.07);border:1px solid rgba(0,217,126,0.2)}
.connection-test.fail{background:rgba(255,71,87,0.07);border:1px solid rgba(255,71,87,0.2);color:var(--red)}
.conn-dot{width:8px;height:8px;border-radius:50%}
.conn-dot.ok{background:var(--emerald);box-shadow:0 0 8px var(--emerald);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.conn-dot.fail{background:var(--red)}

/* HISTORIAL */
.historial-filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filter-chip{padding:5px 12px;border-radius:20px;font-size:11px;font-family:var(--mono);cursor:pointer;border:1px solid var(--border);color:var(--text-secondary);background:transparent;transition:all 0.15s}
.filter-chip.active{border-color:var(--emerald);color:var(--emerald);background:rgba(0,217,126,0.08)}
.filter-chip:hover:not(.active){border-color:var(--border-light);color:var(--text-primary)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(8,15,30,0.85);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--navy2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-title{font-family:var(--display);font-size:15px;font-weight:700}
.modal-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:4px;line-height:1}
.modal-close:hover{color:var(--text-primary)}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

/* QUICK ACTIONS */
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qa-btn{background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;text-align:left;transition:all 0.15s;display:flex;flex-direction:column;gap:4px}
.qa-btn:hover{border-color:var(--emerald);background:rgba(0,217,126,0.05)}
.qa-btn-icon{font-size:18px;margin-bottom:2px}
.qa-btn-label{font-size:12px;font-weight:600;color:var(--text-primary)}
.qa-btn-desc{font-size:10px;color:var(--text-muted);font-family:var(--mono)}

/* ACTIVITY LOG */
.activity-list{display:flex;flex-direction:column;gap:0}
.activity-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(30,51,88,0.4)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0}
.activity-content{flex:1;min-width:0}
.activity-text{font-size:12px;color:var(--text-secondary)}
.activity-text strong{color:var(--text-primary)}
.activity-time{font-family:var(--mono);font-size:10px;color:var(--text-muted);margin-top:2px}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-light)}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 0.25s ease forwards}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:16px 0}
.section-title{font-family:var(--display);font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text-primary)}

/* TOAST */
.toast-container{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:9999}
.toast{background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:12px;display:flex;align-items:center;gap:10px;animation:fadeUp 0.2s ease;box-shadow:0 8px 24px rgba(0,0,0,0.4);max-width:320px}
.toast.success{border-left:3px solid var(--emerald)}
.toast.error{border-left:3px solid var(--red)}
.toast.info{border-left:3px solid var(--blue)}
</style>
</head>

const fmt = (n) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(n);
const fmtShort = (n) => {
  if (n >= 1e9) return `$${(n/1e9).toFixed(1)}B`;
  if (n >= 1e6) return `$${(n/1e6).toFixed(1)}M`;
  if (n >= 1e3) return `$${(n/1e3).toFixed(0)}K`;
  return `$${n}`;
};

function StatusBadge({ status }) {
  const map = { ok: ['badge-ok','Procesado'], pending: ['badge-pending','Pendiente'], error: ['badge-error','Error'], off: ['badge-info','Pausado'] };
  const [cls, label] = map[status] || ['badge-info', status];
  return <span className={`badge ${cls}`}>{label}</span>;
}

function PlatformPill({ platform }) {
  if (platform === 'siigo') return <span className="pill pill-siigo">Siigo</span>;
  if (platform === 'alegra') return <span className="pill pill-alegra">Alegra</span>;
  return <span className="pill pill-both">Ambas</span>;
}

// ─── TOAST SYSTEM ───────────────────────────────────────────────────────────
function useToasts() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type = 'success') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);
  return { toasts, add };
}

function ToastContainer({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>
          <span>{t.type === 'success' ? '✓' : t.type === 'error' ? '✕' : 'ℹ'}</span>
          <span>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

// ─── CAUSACIONES ─────────────────────────────────────────────────────────────
function Causaciones({ toast }) {
  const emptyLine = () => ({ id: Date.now()+Math.random(), cuenta: '', descripcion: '', tercero: '', debito: '', credito: '' });
  const [lines, setLines] = useState([emptyLine(), emptyLine(), emptyLine()]);
  const [header, setHeader] = useState({ fecha: new Date().toISOString().split('T')[0], concepto: '', plataforma: 'both', plantilla: '' });
  const [showPlantillas, setShowPlantillas] = useState(false);
  const [processing, setProcessing] = useState(false);

  const totalDeb = lines.reduce((s,l) => s + (parseFloat(l.debito)||0), 0);
  const totalCred = lines.reduce((s,l) => s + (parseFloat(l.credito)||0), 0);
  const balanced = Math.abs(totalDeb - totalCred) < 1 && totalDeb > 0;

  const updateLine = (id, field, val) => setLines(ls => ls.map(l => l.id===id ? {...l,[field]:val} : l));
  const addLine = () => setLines(ls => [...ls, emptyLine()]);
  const delLine = (id) => { if(lines.length > 2) setLines(ls => ls.filter(l => l.id!==id)); };

  const loadPlantilla = (p) => {
    const templates = {
      1: [
        {cuenta:'5105',descripcion:'Sueldos y Salarios',debito:'6800000',credito:''},
        {cuenta:'5105',descripcion:'Aportes Seguridad Social',debito:'816000',credito:''},
        {cuenta:'2510',descripcion:'Sueldos por Pagar',debito:'',credito:'6800000'},
        {cuenta:'2525',descripcion:'Cesantías por Pagar',debito:'',credito:'816000'},
      ],
      2: [
        {cuenta:'5120',descripcion:'Arrendamiento Oficina',debito:'3200000',credito:''},
        {cuenta:'1305',descripcion:'Retención Arriendo 3.5%',debito:'',credito:'3200000'},
      ],
      3: [
        {cuenta:'2365',descripcion:'IVA Generado 19%',debito:'4560000',credito:''},
        {cuenta:'2365',descripcion:'IVA Descontable',debito:'',credito:'2130000'},
        {cuenta:'1110',descripcion:'Saldo IVA a Pagar',debito:'',credito:'2430000'},
      ],
    };
    const tmpl = templates[p.id];
    if (tmpl) setLines(tmpl.map(t => ({...emptyLine(),...t})));
    setHeader(h => ({...h, concepto: p.name, plataforma: p.platform}));
    setShowPlantillas(false);
    toast(`Plantilla "${p.name}" cargada`, 'success');
  };

  const handleSubmit = () => {
    if (!balanced) { toast('El asiento no está cuadrado', 'error'); return; }
    if (!header.concepto) { toast('Ingrese el concepto del asiento', 'error'); return; }
    setProcessing(true);
    setTimeout(() => {
      setProcessing(false);
      toast(`Asiento causado en ${header.plataforma === 'both' ? 'Siigo y Alegra' : header.plataforma === 'siigo' ? 'Siigo' : 'Alegra'} exitosamente`, 'success');
      setLines([emptyLine(),emptyLine(),emptyLine()]);
      setHeader({fecha:new Date().toISOString().split('T')[0],concepto:'',plataforma:'both',plantilla:''});
    }, 1800);
  };

  return (
    <div className="fade-up">
      {showPlantillas && (
        <div className="modal-overlay" onClick={()=>setShowPlantillas(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">Seleccionar Plantilla</span>
              <button className="modal-close" onClick={()=>setShowPlantillas(false)}>×</button>
            </div>

                    <div className="auto-desc">{p.desc} · {p.lines} líneas</div>
                  </div>
                  <PlatformPill platform={p.platform}/>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      <div className="card" style={{marginBottom:16}}>
        <div className="card-header">
          <span className="card-title">Encabezado del Asiento</span>
          <button className="btn btn-secondary btn-sm" onClick={()=>setShowPlantillas(true)}>
            📋 Usar Plantilla
          </button>
        </div>

          <div className="form-row form-4">
            <div className="field">
              <label>Fecha</label>
              <input type="date" value={header.fecha} onChange={e=>setHeader(h=>({...h,fecha:e.target.value}))}/>

            <div className="field" style={{gridColumn:'span 2'}}>
              <label>Concepto / Descripción</label>
              <input placeholder="Ej: Nómina Mayo 2026" value={header.concepto} onChange={e=>setHeader(h=>({...h,concepto:e.target.value}))}/>

              <select value={header.plataforma} onChange={e=>setHeader(h=>({...h,plataforma:e.target.value}))}>

// ─── AUTOMATIZACIONES ────────────────────────────────────────────────────────
function Automatizaciones({ toast }) {
  const [autos, setAutos] = useState(AUTOMATIONS_DATA);
  const [running, setRunning] = useState(null);
  const [progress, setProgress] = useState({});

  const toggle = (id) => setAutos(as => as.map(a => a.id===id ? {...a,active:!a.active} : a));

  const runNow = (auto) => {
    setRunning(auto.id);
    setProgress(p => ({...p,[auto.id]:0}));
    let pct = 0;
    const iv = setInterval(() => {
      pct += Math.random()*18+5;
      if (pct >= 100) {
        pct = 100;
        clearInterval(iv);
        setRunning(null);
        setProgress(p => ({...p,[auto.id]:100}));
        toast(`"${auto.name}" ejecutada correctamente`, 'success');
        setAutos(as => as.map(a => a.id===auto.id ? {...a,lastRun:'Ahora mismo',status:'ok'} : a));
      }
      setProgress(p => ({...p,[auto.id]:Math.min(pct,100)}));
    }, 280);
  };

  return (
    <div className="fade-up">
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}>
        <button className="btn btn-primary" onClick={() => toast('Nueva automatización — funcionalidad próximamente', 'info')}>
          <Icon name="plus"/> Nueva Automatización
        </button>
      </div>

      <div className="auto-grid">
        {autos.map(auto => {
          const p = progress[auto.id] ?? auto.progress;
          const isRunning = running === auto.id;
          return (
            <div key={auto.id} className="auto-card" style={{background:auto.active?'var(--navy3)':'var(--card)',opacity:auto.active?1:0.65}}>
              <div className={`auto-icon ${auto.platform==='siigo'?'blue':auto.platform==='alegra'?'gold':'green'}`}>
                {auto.freq==='Diario'?'🔄':auto.freq==='Mensual'?'📅':auto.freq==='Semanal'?'🗓':'📊'}
              </div>
              <div className="auto-info">
                <div className="auto-name">{auto.name}</div>
                <div className="auto-desc">{auto.desc}</div>
                <div className="auto-meta">
                  <PlatformPill platform={auto.platform}/>
                  <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text-muted)',background:'var(--navy4)',padding:'1px 6px',borderRadius:4}}>{auto.freq}</span>
                  <StatusBadge status={isRunning?'pending':auto.active?auto.status:'off'}/>
                </div>
                {(auto.active || isRunning) && (
                  <div className="progress-wrap" style={{marginTop:8}}>
                    <div className="progress-label">
                      <span>{isRunning?'Ejecutando...':'Último progreso'}</span>
                      <span>{Math.round(p)}%</span>
                    </div>
                    <div className="progress-bar">
                      <div className={`progress-fill ${p===100?'green':isRunning?'gold':'green'}`} style={{width:`${p}%`}}/>
                    </div>
                  </div>
                )}
                <div style={{display:'flex',gap:16,marginTop:6}}>
                  <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text-muted)'}}>Última: {auto.lastRun}</span>
                  <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text-muted)'}}>Próxima: {auto.nextRun}</span>
                  <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text-muted)'}}>{auto.entries} asientos</span>
                </div>
              </div>
              <div className="auto-actions">
                <button className="btn btn-secondary btn-sm" disabled={isRunning||!auto.active} onClick={()=>runNow(auto)} style={{opacity:(!auto.active||isRunning)?0.4:1}}>
                  <Icon name="play" size={11}/> {isRunning?'...':'Ejecutar'}
                </button>
                <button className={`toggle ${auto.active?'on':''}`} onClick={()=>toggle(auto.id)}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── HISTORIAL ───────────────────────────────────────────────────────────────
function Historial({ toast }) {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [platform, setPlatform] = useState('all');

  const filtered = HISTORIAL_DATA.filter(r => {
    if (filter !== 'all' && r.status !== filter) return false;
    if (platform !== 'all' && r.platform !== platform) return false;
    if (search && !r.concepto.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const total = filtered.reduce((s,r) => s+r.debito, 0);

  return (
    <div className="fade-up">
      <div style={{display:'flex',gap:12,marginBottom:16,alignItems:'center',flexWrap:'wrap'}}>
        <input placeholder="Buscar por concepto..." value={search} onChange={e=>setSearch(e.target.value)}
          style={{width:220,background:'var(--navy3)',border:'1px solid var(--border)',borderRadius:6,padding:'7px 12px',color:'var(--text-primary)',fontFamily:'var(--sans)',fontSize:13,outline:'none'}}/>
        <div className="historial-filters">
          {[['all','Todos'],['ok','Procesados'],['pending','Pendientes'],['error','Errores']].map(([v,l]) => (
            <button key={v} className={`filter-chip ${filter===v?'active':''}`} onClick={()=>setFilter(v)}>{l}</button>
          ))}
        </div>
        <select value={platform} onChange={e=>setPlatform(e.target.value)}
          style={{background:'var(--navy3)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px',color:'var(--text-secondary)',fontFamily:'var(--mono)',fontSize:11,outline:'none'}}>
          <option value="all">Todas las plataformas</option>
          <option value="siigo">Siigo</option>
          <option value="alegra">Alegra</option>
          <option value="both">Ambas</option>
        </select>
        <button className="btn btn-secondary btn-sm" style={{marginLeft:'auto'}} onClick={()=>toast('Exportando a Excel...','info')}>
          <Icon name="download" size={11}/> Exportar
        </button>
      </div>

      <div className="card">
        <div className="card-header">
          <span className="card-title">{filtered.length} registros encontrados</span>
          <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text-muted)'}}>Total: <span style={{color:'var(--emerald)'}}>{fmt(total)}</span></span>
        </div>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Fecha</th><th>Hora</th><th>Concepto</th><th>Tipo</th>
                <th>Plataforma</th><th>Cuentas</th>
                <th style={{textAlign:'right'}}>Débito</th>
                <th style={{textAlign:'right'}}>Crédito</th>
                <th>Estado</th><th>Usuario</th><th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(r => (
                <tr key={r.id}>
                  <td className="td-mono" style={{fontSize:11}}>{r.fecha}</td>
                  <td className="td-mono" style={{fontSize:11,color:'var(--text-muted)'}}>{r.hora}</td>
                  <td style={{fontWeight:500}}>{r.concepto}</td>
                  <td style={{fontSize:11,color:'var(--text-secondary)'}}>{r.tipo}</td>
                  <td><PlatformPill platform={r.platform}/></td>
                  <td className="td-mono" style={{textAlign:'center',color:'var(--text-muted)'}}>{r.cuentas}</td>
                  <td className="td-amount debit">{fmt(r.debito)}</td>
                  <td className="td-amount credit">{fmt(r.credito)}</td>
                  <td><StatusBadge status={r.status}/></td>
                  <td style={{fontSize:11,color:'var(--text-muted)',fontFamily:'var(--mono)'}}>{r.user}</td>
                  <td>
                    <button className="btn btn-secondary btn-sm" onClick={()=>toast(`Ver detalle: ${r.concepto}`,'info')} style={{padding:'3px 8px'}}>
                      <Icon name="eye" size={11}/>
                    </button>
                  </td>
                </tr>
              ))}
              {filtered.length === 0 && (
                <tr><td colSpan={11} style={{textAlign:'center',padding:'32px',color:'var(--text-muted)',fontFamily:'var(--mono)',fontSize:12}}>No se encontraron registros</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

            <div className="sync-row"><div className="sync-dot on"/><span className="sync-label">Alegra</span><span className="sync-time">hace 1h</span></div>
          </div>
          <div style={{marginTop:12,padding:'8px 0',borderTop:'1px solid var(--border)'}}>
            <div style={{fontSize:11,color:'var(--text-secondary)',fontWeight:500}}>Carlos A. Vargas</div>
            <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text-muted)'}}>Contador Público · TP-78432</div>
          </div>
        </div>
      </aside>

      <main className="main">
        <div className="topbar">
          <div>
            <div className="topbar-title">{pageTitles[page]?.title}</div>
            <div className="topbar-sub">{pageTitles[page]?.sub}</div>
          </div>
          <div className="topbar-actions">
            <button className="btn btn-secondary btn-sm" onClick={()=>toast('Sincronizando plataformas...','info')}>
              <Icon name="refresh" size={11}/> Sync Manual
            </button>
            {page !== 'causaciones' && (
              <button className="btn btn-primary btn-sm" onClick={()=>setPage('causaciones')}>
                <Icon name="plus"/> Nueva Causación
              </button>
            )}
          </div>
        </div>

        <div className="content">
          {renderPage()}
        </div>
      </main>

      <ToastContainer toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
